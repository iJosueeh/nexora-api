spring:
  datasource:
    url: jdbc:h2:mem:nexora;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": false

  flyway:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/auth/v1

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

jwt:
  secret: test-secret-key-for-jwt-signing-test-secret-key-12345
  refresh-secret: test-refresh-secret-key-for-jwt-signing-1234567
  expiration: 900000
  refresh-expiration: 604800000

supabase:
  url: http://localhost
  key: dummy-key

app:
  storage:
    endpoint: http://localhost:54321
    region: sa-east-1
    access-key: test-access-key
    secret-key: test-secret-key
    buckets:
      resources: test-resources
    presigned-url-expiry: 15m
    max-resource-size: 20971520

logging:
  level:
    root: WARN
